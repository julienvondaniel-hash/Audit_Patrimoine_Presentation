name: Déploiement GitHub Pages (étude patrimoniale)

# Publie le dossier docs/ (application web statique) sur GitHub Pages.
# Prérequis : Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Téléverser l'artefact (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
